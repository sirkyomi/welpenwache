services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: welpenwache-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${WELPENWACHE_SQL_PASSWORD}"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
