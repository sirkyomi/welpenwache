name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Compute semantic version
        uses: dotnet/nbgv@master
        with:
          setAllVars: true

      - name: Compute image name
        run: echo "IMAGE_NAME=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Restore backend
        run: dotnet restore backend/WelpenWache.Api/WelpenWache.Api.csproj

      - name: Publish backend with bundled frontend
        env:
          APP_VERSION: ${{ env.NBGV_SemVer2 }}
        run: dotnet publish backend/WelpenWache.Api/WelpenWache.Api.csproj -c Release -o artifacts/iis -p:Version=${{ env.NBGV_SimpleVersion }} -p:InformationalVersion=${{ env.NBGV_SemVer2 }}

      - name: Remove development settings from IIS package
        run: rm -f artifacts/iis/appsettings.Development.json

      - name: Archive IIS release files
        working-directory: artifacts/iis
        run: zip -r ../welpenwache-iis-${{ env.NBGV_SimpleVersion }}.zip .

      - name: Upload IIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: welpenwache-iis-${{ env.NBGV_SimpleVersion }}
          path: artifacts/welpenwache-iis-${{ env.NBGV_SimpleVersion }}.zip
          if-no-files-found: error

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ env.NBGV_SemVer2 }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.NBGV_SimpleVersion }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ env.NBGV_SemVer2 }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NBGV_SimpleVersion }}
          name: v${{ env.NBGV_SimpleVersion }}
          generate_release_notes: true
          overwrite_files: true
          files: artifacts/welpenwache-iis-${{ env.NBGV_SimpleVersion }}.zip
